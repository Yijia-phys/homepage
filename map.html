<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Trace · Yijia Zhao</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --accent:#d4724f; --glass:rgba(10,8,6,0.30); --border:rgba(255,255,255,0.09);
  --text:rgba(255,255,255,0.92); --muted:rgba(255,255,255,0.50); --radius:14px; --blur:14px;
}
html,body { width:100%; height:100%; overflow:hidden; font-family:'Crimson Pro',Georgia,serif; color:var(--text); user-select:none; }

#bg,#bg-next { position:fixed; inset:0; z-index:0; background-size:cover; background-position:center; }
#bg-next { opacity:0; transition:opacity .8s; }
#overlay { position:fixed; inset:0; z-index:1; background:linear-gradient(135deg,rgba(0,0,0,.52) 0%,rgba(0,0,0,.28) 50%,rgba(0,0,0,.48) 100%); transition:opacity .4s; }
#wave-canvas { position:fixed; inset:0; z-index:2; pointer-events:none; opacity:.55; }

/* ── Layout ── */
.page { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; padding:1.6rem 2.2rem 1.4rem; gap:1rem; }

/* ── Top bar ── */
.topbar { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.back-btn {
  font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:.4rem;
  padding:.35em .8em; border-radius:7px; border:1px solid var(--border);
  background:rgba(255,255,255,.06); transition:color .15s, border-color .15s, background .15s;
}
.back-btn:hover { color:var(--accent); border-color:rgba(212,114,79,.4); background:rgba(212,114,79,.1); }
.page-title { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:400; letter-spacing:-.01em; }
.page-title em { color:var(--accent); font-style:italic; }
.topbar-right { display:flex; gap:.6rem; align-items:center; }

/* ── Map container ── */
.map-wrap {
  flex:0 0 62vh; position:relative; min-height:0;
  border-radius:var(--radius); overflow:hidden;
  background:rgba(10,8,6,.28); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border);
}
#map-canvas, #city-canvas {
  position:absolute; inset:0; width:100%; height:100%;
}
#city-canvas { z-index:1; pointer-events:none; }
/* Scanlines */
.map-wrap::after {
  content:''; position:absolute; inset:0; z-index:3; pointer-events:none; border-radius:var(--radius);
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 3px);
}
/* Vignette */
.map-wrap::before {
  content:''; position:absolute; inset:0; z-index:2; pointer-events:none; border-radius:var(--radius);
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.35) 100%);
}

/* ── Info panel ── */
.info-panel {
  flex:1; min-height:0; max-height:200px;
  background:var(--glass); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
  border:1px solid var(--border); border-radius:var(--radius);
  display:flex; align-items:stretch; overflow:hidden;
  transition:border-color .25s;
}
.info-panel.active { border-color:rgba(212,114,79,.35); }

/* Photo column */
.info-photo {
  width:140px; flex-shrink:0; position:relative; overflow:hidden;
  background:#0a0a0a;
}
.info-photo img {
  width:100%; height:100%; object-fit:cover;
  filter:saturate(0.6) contrast(1.1);
  transition:filter .3s;
  display:block;
}
.info-panel.active .info-photo img { filter:saturate(0.75) contrast(1.15) brightness(0.95); }

/* Glitch overlay on photo */
.glitch-wrap { position:absolute; inset:0; pointer-events:none; }
.glitch-wrap canvas { position:absolute; inset:0; width:100%; height:100%; }

/* Text column */
.info-text {
  flex:1; padding:.85rem 1.1rem; display:flex; flex-direction:column; justify-content:center; gap:.4rem;
}
.info-empty {
  font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.08em; text-transform:uppercase;
  color:rgba(255,255,255,.18); align-self:center; margin:auto;
}
.info-city {
  font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:400; color:var(--text);
  display:none;
}
.info-city em { color:var(--accent); font-style:italic; }
.info-desc {
  font-size:.9rem; color:var(--muted); line-height:1.6; font-style:italic;
  display:none; max-width:540px;
}
.info-meta {
  font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:.06em; text-transform:uppercase;
  color:var(--accent); display:none;
}
.info-panel.active .info-city,
.info-panel.active .info-desc,
.info-panel.active .info-meta { display:block; }
.info-panel.active .info-empty { display:none; }

/* ── Settings button ── */
.settings-btn { width:32px; height:32px; border-radius:8px; background:rgba(255,255,255,.07); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); transition:background .15s,color .15s; }
.settings-btn:hover { background:rgba(255,255,255,.14); color:var(--text); }
.settings-btn svg { width:14px; height:14px; }

/* ── Settings panel ── */
.settings-panel { position:fixed; top:4.5rem; right:2.2rem; z-index:100; width:300px; padding:1.1rem 1.2rem; display:none; flex-direction:column; gap:1rem; max-height:80vh; overflow-y:auto; }
.settings-panel.open { display:flex; }
.glass { background:var(--glass); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur)); border:1px solid var(--border); border-radius:var(--radius); }
.s-title { font-family:'JetBrains Mono',monospace; font-size:.63rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); padding-bottom:.45rem; }
.wallpaper-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.4rem; }
.wp-thumb { aspect-ratio:16/9; border-radius:6px; border:2px solid transparent; cursor:pointer; overflow:hidden; transition:border-color .15s,transform .15s; background-size:cover; background-position:center; position:relative; }
.wp-thumb:hover { transform:scale(1.05); }
.wp-thumb.active { border-color:var(--accent); }
.wp-thumb-del { position:absolute; top:2px; right:2px; width:14px; height:14px; background:rgba(0,0,0,.6); border-radius:50%; font-size:9px; display:none; align-items:center; justify-content:center; color:#fff; cursor:pointer; line-height:1; }
.wp-thumb:hover .wp-thumb-del { display:flex; }
.upload-btn { width:100%; padding:.45rem; border-radius:8px; background:rgba(255,255,255,.06); border:1px dashed var(--border); color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:.63rem; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; transition:background .15s,border-color .15s,color .15s; text-align:center; }
.upload-btn:hover { background:rgba(212,114,79,.12); border-color:var(--accent); color:var(--accent); }
#file-input { display:none; }
.slider-row { display:flex; flex-direction:column; gap:.35rem; }
.slider-label { font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); display:flex; justify-content:space-between; }
.slider-label span { color:var(--accent); }
input[type=range] { width:100%; height:4px; border-radius:2px; appearance:none; background:rgba(255,255,255,.15); outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { appearance:none; width:13px; height:13px; border-radius:50%; background:var(--accent); cursor:pointer; }
.settings-close { align-self:flex-end; font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); cursor:pointer; background:none; border:none; transition:color .15s; padding:0; }
.settings-close:hover { color:var(--accent); }

.wp-gradient-1{background:linear-gradient(135deg,#1a0a2e 0%,#2d1b69 40%,#11998e 100%);}
.wp-gradient-2{background:linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%);}
.wp-gradient-3{background:linear-gradient(135deg,#141e30 0%,#243b55 100%);}
.wp-gradient-4{background:linear-gradient(135deg,#1a0533 0%,#6a003a 50%,#ff6e00 100%);}
.wp-gradient-5{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#21262d 100%);}
</style>

        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.901-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52z"/></svg>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,def){try{var v=localStorage.getItem(k);return v==null?def:JSON.parse(v);}catch(e){return def;}}

// ── Wallpapers (shared with index.html via localStorage) ─────────────
var PRESETS=[
  {type:'gradient',cls:'wp-gradient-1',label:'Nebula'},
  {type:'gradient',cls:'wp-gradient-2',label:'Ocean'},
  {type:'gradient',cls:'wp-gradient-3',label:'Midnight'},
  {type:'gradient',cls:'wp-gradient-4',label:'Ember'},
  {type:'gradient',cls:'wp-gradient-5',label:'Void'},
];
var userWps=load('user-wps',[]);
var currentWp=load('current-wp','preset-3');
var bg=document.getElementById('bg');
var bgNext=document.getElementById('bg-next');
function allWps(){return PRESETS.map(function(p,i){return Object.assign({id:'preset-'+i},p);}).concat(userWps.map(function(u){return {id:u.id,type:'image',src:u.dataUrl};}));}
function applyWpToEl(el,wp){el.className='';el.style.backgroundImage='';if(wp.type==='gradient'){el.classList.add(wp.cls);}else{el.style.backgroundImage='url('+wp.src+')';el.style.backgroundSize='cover';}}
function switchWallpaper(id){
  if(id===currentWp)return;
  var wp=allWps().find(function(w){return w.id===id;});if(!wp)return;
  applyWpToEl(bgNext,wp);bgNext.style.opacity='1';
  setTimeout(function(){applyWpToEl(bg,wp);bgNext.style.opacity='0';currentWp=id;save('current-wp',id);refreshThumbs();},820);
}
function deleteUserWp(id,e){e.stopPropagation();userWps=userWps.filter(function(u){return u.id!==id;});save('user-wps',userWps);if(currentWp===id)switchWallpaper('preset-3');refreshThumbs();}
function refreshThumbs(){
  var grid=document.getElementById('wp-grid');grid.innerHTML='';
  allWps().forEach(function(wp){
    var t=document.createElement('div');t.className='wp-thumb'+(wp.id===currentWp?' active':'');
    if(wp.type==='gradient'){t.classList.add(wp.cls);t.title=wp.label||'';}else{t.style.backgroundImage='url('+wp.src+')';}
    t.onclick=function(){switchWallpaper(wp.id);};
    if(wp.type==='image'){var del=document.createElement('div');del.className='wp-thumb-del';del.textContent='✕';del.onclick=function(e){deleteUserWp(wp.id,e);};t.appendChild(del);}
    grid.appendChild(t);
  });
}
document.getElementById('file-input').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){var id='user-'+Date.now();userWps.push({id:id,dataUrl:ev.target.result});if(userWps.length>8)userWps=userWps.slice(-8);save('user-wps',userWps);refreshThumbs();switchWallpaper(id);};
  reader.readAsDataURL(file);e.target.value='';
});
(function(){var wp=allWps().find(function(w){return w.id===currentWp;})||allWps()[3];applyWpToEl(bg,wp);currentWp=wp.id;})();
refreshThumbs();

// ── Display sliders ──────────────────────────────────────────────────
var dispCfg=load('display',{blur:8,bright:85,overlay:55});
function applyDisplay(){
  bg.style.filter=bgNext.style.filter='blur('+dispCfg.blur+'px) brightness('+(dispCfg.bright/100)+')';
  document.getElementById('overlay').style.opacity=dispCfg.overlay/100;
  document.getElementById('sl-blur').value=dispCfg.blur;
  document.getElementById('sl-bright').value=dispCfg.bright;
  document.getElementById('sl-overlay').value=dispCfg.overlay;
  document.getElementById('lbl-blur').textContent=dispCfg.blur+'px';
  document.getElementById('lbl-bright').textContent=dispCfg.bright+'%';
  document.getElementById('lbl-overlay').textContent=dispCfg.overlay+'%';
}
applyDisplay();
document.getElementById('sl-blur').oninput=function(){dispCfg.blur=+this.value;document.getElementById('lbl-blur').textContent=this.value+'px';bg.style.filter=bgNext.style.filter='blur('+dispCfg.blur+'px) brightness('+(dispCfg.bright/100)+')';save('display',dispCfg);};
document.getElementById('sl-bright').oninput=function(){dispCfg.bright=+this.value;document.getElementById('lbl-bright').textContent=this.value+'%';bg.style.filter=bgNext.style.filter='blur('+dispCfg.blur+'px) brightness('+(dispCfg.bright/100)+')';save('display',dispCfg);};
document.getElementById('sl-overlay').oninput=function(){dispCfg.overlay=+this.value;document.getElementById('lbl-overlay').textContent=this.value+'%';document.getElementById('overlay').style.opacity=dispCfg.overlay/100;save('display',dispCfg);};

// ── Settings ──────────────────────────────────────────────────────────
function toggleSettings(){document.getElementById('settings').classList.toggle('open');}
document.addEventListener('click',function(e){var p=document.getElementById('settings');if(!p.contains(e.target)&&!e.target.closest('.settings-btn'))p.classList.remove('open');});

// ── Wave canvas ───────────────────────────────────────────────────────
var wc=document.getElementById('wave-canvas'),wctx=wc.getContext('2d'),wW,wH;
function wResize(){wW=wc.width=window.innerWidth;wH=wc.height=window.innerHeight;}
wResize();window.addEventListener('resize',wResize);
var WAVES=[{A:55,k:.010,omega:.55,phi:0.0,r:212,g:114,b:79},{A:32,k:.018,omega:.85,phi:1.8,r:100,g:160,b:200},{A:20,k:.030,omega:1.20,phi:3.5,r:180,g:140,b:210}];
function drawWaves(t){
  wctx.clearRect(0,0,wW,wH);var cy=wH*.72,halfW=wW*.5,envW=wW*.42;
  for(var wi=0;wi<WAVES.length;wi++){var w=WAVES[wi];
    wctx.beginPath();for(var x=0;x<=wW;x+=2){var dx=(x-halfW)/envW;var env=Math.exp(-(dx*dx));var y=cy+w.A*env*Math.sin(w.k*(x-halfW)+w.omega*t+w.phi);if(x===0){wctx.moveTo(x,y);}else{wctx.lineTo(x,y);}}
    wctx.strokeStyle='rgba('+w.r+','+w.g+','+w.b+',0.45)';wctx.lineWidth=1.5;wctx.stroke();
    wctx.beginPath();for(var x2=0;x2<=wW;x2+=2){var dx2=(x2-halfW)/envW;var env2=Math.exp(-(dx2*dx2));var y2=cy+w.A*env2*Math.sin(w.k*(x2-halfW)+w.omega*t+w.phi);if(x2===0){wctx.moveTo(x2,y2);}else{wctx.lineTo(x2,y2);}}
    wctx.lineTo(wW,wH);wctx.lineTo(0,wH);wctx.closePath();
    var grad=wctx.createLinearGradient(0,cy-60,0,cy+100);grad.addColorStop(0,'rgba('+w.r+','+w.g+','+w.b+',0.04)');grad.addColorStop(1,'rgba('+w.r+','+w.g+','+w.b+',0.00)');wctx.fillStyle=grad;wctx.fill();
  }
}
function wloop(ts){drawWaves(ts*.001);requestAnimationFrame(wloop);}
requestAnimationFrame(wloop);

// ══════════════════════════════════════════════════════════════════════
// ── CITIES — edit here to add entries
// photo: path to image file (put in assets/photos/)
// desc:  one sentence shown in the info panel
// meta:  e.g. year or duration
// ══════════════════════════════════════════════════════════════════════
var CITIES = [
  {
    name: 'Shenyang',
    lon: 123.43, lat: 41.80,
    type: 'current',
    photo: 'assets/photos/shenyang.jpg',
    desc: 'The vibrant capital of Liaoning, perfectly blends Imperial history with industrial pride. My hometown.',
    meta: '2007 – present'
  },

  //   lon: 116.40, lat: 39.90,
  //   type: 'visited',
  //   photo: 'assets/photos/beijing.jpg',
  //   desc: 'A brief stay for a competition. Tianamen at dusk, equations at dawn.',
  //   meta: 'Summer 2024'
  // },
];

// ── Inline TopoJSON decoder ───────────────────────────────────────────
var topo = {
  feature: function(topology, obj) {
    var arcs=topology.arcs, t=topology.transform;
    function decodeArc(i){var arc=arcs[i<0?~i:i],pts=[],x=0,y=0;for(var j=0;j<arc.length;j++){x+=arc[j][0];y+=arc[j][1];pts.push([x,y]);}if(i<0)pts.reverse();return pts;}
    function decodeArcs(idxs){var pts=[];for(var i=0;i<idxs.length;i++){var seg=decodeArc(idxs[i]);if(i>0)seg=seg.slice(1);pts=pts.concat(seg);}return pts;}
    function tp(p){return t?[p[0]*t.scale[0]+t.translate[0],p[1]*t.scale[1]+t.translate[1]]:p;}
    function decodeGeom(g){
      if(g.type==='Polygon')return{type:'Polygon',coordinates:g.arcs.map(function(r){return decodeArcs(r).map(tp);})};
      if(g.type==='MultiPolygon')return{type:'MultiPolygon',coordinates:g.arcs.map(function(poly){return poly.map(function(r){return decodeArcs(r).map(tp);});})};
      return null;
    }
    var features=(obj.geometries||[])
      .map(function(g){return{type:'Feature',id:g.id,properties:g.properties||{},geometry:decodeGeom(g)};})
      .filter(function(f){return f.geometry;});
    return{type:'FeatureCollection',features:features};
  }
};

// ── Map rendering (d3-geo — handles antimeridian correctly) ──────────
var mapWrap   = document.getElementById('map-wrap');
var mapCanvas = document.getElementById('map-canvas');
var cityCanvas= document.getElementById('city-canvas');
var mctx      = mapCanvas.getContext('2d');
var cctx      = cityCanvas.getContext('2d');
var mapW, mapH, mapCities=[], worldGeo=null;
var d3proj = null; // d3 projection instance, rebuilt on resize

function buildProjection(W, H) {
  // Equirectangular centered on lon=15, lat=15 to push map slightly south
  // scale and translate chosen to fill canvas width
  // scale W/7.2 → zoomed out enough to show Alaska, NZ, tip of Chile
  // center lat 5 → map sits a touch north so S.America clears the bottom
  return d3.geoEquirectangular()
    .center([15, 5])
    .scale(W / 7.2)
    .translate([W / 2, H / 2]);
}

function drawMapStatic() {
  mapW = mapWrap.clientWidth; mapH = mapWrap.clientHeight;
  mapCanvas.width=mapW; mapCanvas.height=mapH;
  cityCanvas.width=mapW; cityCanvas.height=mapH;
  mctx.clearRect(0,0,mapW,mapH);

  d3proj = buildProjection(mapW, mapH);
  var path = d3.geoPath().projection(d3proj).context(mctx);

  // Graticule
  var graticule = d3.geoGraticule().step([30, 30])();
  mctx.beginPath(); path(graticule);
  mctx.strokeStyle='rgba(100,180,255,0.05)'; mctx.lineWidth=0.5; mctx.stroke();

  if(!worldGeo){
    mctx.fillStyle='rgba(140,200,255,0.12)';mctx.font='10px monospace';mctx.textAlign='center';
    mctx.fillText('Loading map…',mapW/2,mapH/2);
    mapCities=CITIES.map(function(c){var p=d3proj([c.lon,c.lat]);return Object.assign({},c,{x:p[0],y:p[1]});});
    return;
  }

  // Land fill
  mctx.beginPath();
  worldGeo.features.forEach(function(f){ path(f); });
  mctx.fillStyle='rgba(120,185,225,0.09)'; mctx.fill();

  // Coastline
  mctx.beginPath();
  worldGeo.features.forEach(function(f){ path(f); });
  mctx.strokeStyle='rgba(140,215,255,0.26)'; mctx.lineWidth=0.6; mctx.stroke();

  // City screen positions via d3 projection
  mapCities = CITIES.map(function(c){
    var p = d3proj([c.lon, c.lat]);
    return Object.assign({},c,{x:p[0],y:p[1]});
  });
}

// ── City dot animation ────────────────────────────────────────────────
function animateCities(ts) {
  var t=ts*.001;
  cctx.clearRect(0,0,mapW,mapH);
  for(var i=0;i<mapCities.length;i++){
    var c=mapCities[i];
    if(c.type==='current'){
      var pulse=Math.abs(Math.sin(t*1.8));
      cctx.beginPath();cctx.arc(c.x,c.y,9+5*pulse,0,Math.PI*2);
      cctx.strokeStyle='rgba(220,80,60,'+(0.18*pulse)+')';cctx.lineWidth=1;cctx.stroke();
      var grd=cctx.createRadialGradient(c.x,c.y,0,c.x,c.y,9);
      grd.addColorStop(0,'rgba(255,80,60,0.55)');grd.addColorStop(1,'rgba(255,80,60,0)');
      cctx.fillStyle=grd;cctx.beginPath();cctx.arc(c.x,c.y,9,0,Math.PI*2);cctx.fill();
      cctx.beginPath();cctx.arc(c.x,c.y,4,0,Math.PI*2);cctx.fillStyle='#ff5040';cctx.fill();
    } else {
      var wg=cctx.createRadialGradient(c.x,c.y,0,c.x,c.y,7);
      wg.addColorStop(0,'rgba(255,255,255,0.4)');wg.addColorStop(1,'rgba(255,255,255,0)');
      cctx.fillStyle=wg;cctx.beginPath();cctx.arc(c.x,c.y,7,0,Math.PI*2);cctx.fill();
      cctx.beginPath();cctx.arc(c.x,c.y,4,0,Math.PI*2);cctx.fillStyle='rgba(255,255,255,0.85)';cctx.fill();
    }
  }
  requestAnimationFrame(animateCities);
}

// ── Info panel + glitch ───────────────────────────────────────────────
var infoPanel  = document.getElementById('info-panel');
var infoImg    = document.getElementById('info-img');
var infoCity   = document.getElementById('info-city');
var infoDesc   = document.getElementById('info-desc');
var infoMeta   = document.getElementById('info-meta');
var glitchCv   = document.getElementById('glitch-canvas');
var gctx       = glitchCv.getContext('2d');
var activeCity = null;
var glitchTimer= null;

function showCity(c) {
  if(activeCity===c) return;
  activeCity = c;
  infoPanel.classList.add('active');
  infoCity.innerHTML = c.name + (c.type==='current'?' <em>· now</em>':'');
  infoDesc.textContent = c.desc || '';
  infoMeta.textContent = c.meta || '';
  if(c.photo){
    infoImg.src = c.photo;
    infoImg.style.opacity='1';
  } else {
    infoImg.style.opacity='0';
  }
  triggerGlitch();
}

function hideCity() {
  activeCity=null;
  infoPanel.classList.remove('active');
  gctx.clearRect(0,0,glitchCv.width,glitchCv.height);
  clearTimeout(glitchTimer);
}

// Glitch effect: random RGB-channel slices
function triggerGlitch() {
  clearTimeout(glitchTimer);
  var runs = 0;
  function frame() {
    var pw=infoImg.offsetWidth, ph=infoImg.offsetHeight;
    glitchCv.width=pw; glitchCv.height=ph;
    gctx.clearRect(0,0,pw,ph);
    if(!infoImg.complete||!infoImg.naturalWidth){glitchTimer=setTimeout(frame,80);return;}
    // draw a few shifted slices with channel-split tint
    var slices = 4 + Math.floor(Math.random()*4);
    for(var s=0;s<slices;s++){
      var sy  = Math.floor(Math.random()*ph);
      var sh  = 2 + Math.floor(Math.random()*14);
      var shx = (Math.random()-.5)*18;
      // Red channel offset
      gctx.save();
      gctx.globalCompositeOperation='source-over';
      gctx.globalAlpha=0.45;
      gctx.fillStyle='rgba(255,0,60,0.25)';
      gctx.fillRect(shx, sy, pw, sh);
      // Cyan offset
      gctx.fillStyle='rgba(0,220,255,0.18)';
      gctx.fillRect(-shx, sy+2, pw, sh);
      gctx.restore();
      // Horizontal scanline flash
      if(Math.random()>0.5){
        gctx.fillStyle='rgba(255,255,255,'+(0.04+Math.random()*.06)+')';
        gctx.fillRect(0, sy, pw, 1);
      }
    }
    runs++;
    if(runs < 6) glitchTimer = setTimeout(frame, 60 + Math.random()*80);
    else gctx.clearRect(0,0,pw,ph);
  }
  frame();
}

// Re-trigger glitch on interval while a city is active
setInterval(function(){if(activeCity&&Math.random()>.65)triggerGlitch();}, 3200);

// ── Map hover ─────────────────────────────────────────────────────────
mapWrap.addEventListener('mousemove', function(e){
  var rect=mapWrap.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,hit=null;
  for(var i=0;i<mapCities.length;i++){var c=mapCities[i],d=Math.sqrt((mx-c.x)*(mx-c.x)+(my-c.y)*(my-c.y));if(d<16){hit=c;break;}}
  if(hit){showCity(hit);mapWrap.style.cursor='crosshair';}
  else{hideCity();mapWrap.style.cursor='';}
});
mapWrap.addEventListener('mouseleave', hideCity);

// ── Boot ──────────────────────────────────────────────────────────────
window.addEventListener('load', function(){
  drawMapStatic();
  requestAnimationFrame(animateCities);
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json')
    .then(function(r){return r.json();})
    .then(function(world){
      worldGeo = topo.feature(world, world.objects.land);
      drawMapStatic();
    })
    .catch(function(){
      mctx.fillStyle='rgba(255,100,80,0.4)';mctx.font='10px monospace';mctx.textAlign='center';
      mctx.fillText('Map unavailable',mapW/2,mapH/2);
    });
});
window.addEventListener('resize', drawMapStatic);
</script>
